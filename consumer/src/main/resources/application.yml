server:
  port: 8092

spring:
  application:
    name: consumer

  kafka:
    bootstrap-servers: 192.100.100.20:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: abcd-group-1

logging:
  level:
    org.example.consumer: debug